{% extends 'base.html' %}

{% block title %}Contact - Saumya Kumar Panwar{% endblock %}

{% block content %}
<div class="container">
    <h1 class="section-title" style="text-align: center; font-size: 36px; margin-bottom: 10px;"><u>Get In Touch</u></h1>
    <p style="text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 40px; font-size: 18px;">
        Have a question or want to work together? Drop me a message below.
    </p>
        <div class="contact-wrapper">
            <form method="post" action="{{ url_for('contacts') }}" class="contact-form">
            
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="How can I help you?"></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
</div>
{% endblock %}
